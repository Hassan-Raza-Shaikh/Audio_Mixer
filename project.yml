name: AudioMixer
options:
  bundleIdPrefix: com.hassan
targets:
  AudioMixer:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: "Aura"
        PRODUCT_BUNDLE_IDENTIFIER: com.hassan.Aura
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENING: YES
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: Resources/AudioMixer.entitlements
